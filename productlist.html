<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Produktliste</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/productlist.js" defer></script>
  </head>
  <body>
    <header class="top">
      <a class="logo" href="index.html">FashionRUs</a>

      <nav class="menu">
        <a href="index.html">Kategorier</a>
        <a href="productlist.html">Produkter</a>
      </nav>
    </header>

    <main class="indhold">
      <h1 class="kategori_titel">Kategori</h1>

      <section class="filter_knapper">
        <button class="filterbutton">All</button>
        <button class="filterbutton">Unisex</button>
        <button class="filterbutton">Women</button>
        <button class="filterbutton">Men</button>
      </section>
      <section class="sortering_knapper">
        <button class="sortbutton" data-price="asc">Pris: Lav-Høj</button>
        <button class="sortbutton" data-price="desc">Pris: Høj-lav</button>
        <button class="sortbutton" data-text="az">A-Z</button>
        <button class="sortbutton" data-text="za">Z-A</button>
      </section>

      <section class="produkt_liste"></section>
    </main>

    <footer class="bund">
      <p>© FashionRUs</p>
    </footer>
  </body>
</html>
